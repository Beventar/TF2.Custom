//xhair TYPE toggle--switches crosshair type when shooting; good for preventing Amby xhair from expanding too     large (uses my settings as an example). NOTE: Must be manually integrated with viewmodel scripts to work in conjunction.
//=========================================================
	alias dotxhairtype "dotxhairtypeb"
	alias dotxhairtypeb "cl_crosshair_file crosshair2;cl_crosshair_scale 22;alias dotxhairtype dotxhairtyper" // tweak     crosshair_scale values to your liking
	alias dotxhairtyper "cl_crosshair_file crosshair5;cl_crosshair_scale 18;alias dotxhairtype dotxhairtypeb"

// Stabby specific settings
tf_dingaling_pitchmindmg 50
tf_dingaling_pitchmaxdmg 150
viewmodel_fov 90
cl_hud_playerclass_use_playermodel 0
net_graphpos 267

// Stabby's shadows
r_shadows 1
r_shadowrendertotexture 1
r_shadowmaxrendered 4

// Stabby's graphics settings
mat_filtertextures 0

// RAGDOLLS:
//Use thse settings for FPS and to detect DR feigns vs real spy deaths--fake = instant corpse disappear, real = corpse fades

cl_ragdoll_fade_time 0 // default 15
cl_ragdoll_forcefade 1
cl_ragdoll_physics_enable 1
g_ragdoll_fadespeed 0 // def 600
g_ragdoll_lvfadespeed 0 // def 100
ragdoll_sleepaftertime "5.0f"
g_ragdoll_maxcount 0
g_ragdoll_important_maxcount 0
cl_ragdoll_pronecheck_distance 0