bind w +mfwd
bind s +mback
bind a +mleft
bind d +mright
alias +mfwd "-back;+forward;alias checkfwd +forward; +forward;dotxhaircolor"
alias +mback "-forward;+back;alias checkback +back; +back;dotxhaircolor"
alias +mleft "-moveright;+moveleft;alias checkleft +moveleft; +moveleft;dotxhaircolor"
alias +mright "-moveleft;+moveright;alias checkright +moveright; +moveright;dotxhaircolor"
alias -mfwd "-forward;checkback;alias checkfwd none; -forward;dotxhaircolor"
alias -mback "-back;checkfwd;alias checkback none; -back;dotxhaircolor"
alias -mleft "-moveleft;checkright;alias checkleft none; -moveleft;dotxhaircolor"
alias -mright "-moveright;checkleft;alias checkright none; -moveright;dotxhaircolor"
alias checkfwd none
alias checkback none
alias checkleft none
alias checkright none
alias none ""
alias +crouchjump "+jump;+duck"   //remove +duck
alias -crouchjump "-jump;-duck"   //and -duck
bind space "+crouchjump;"		  //if you want to jump normally:


//xhair color toggle--delete this to keep your xhair from flashing
//=========================================================
alias dotxhaircolor "dotxhaircolorb"
alias dotxhaircolorb "cl_crosshair_blue 0; cl_crosshair_green 255; cl_crosshair_red 0;alias dotxhaircolor dotxhaircolorr"
alias dotxhaircolorr "cl_crosshair_blue 255; cl_crosshair_green 0; cl_crosshair_red 255;alias dotxhaircolor dotxhaircolorb"
//=========================================================